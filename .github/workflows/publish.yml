on:
  workflow_dispatch:
  push:
    branches: main

name: Build & Publish

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install librsvg
        run: sudo apt-get install -y librsvg2-bin

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Render Quarto project
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: docs

      # -----------------------------------------------------------------
      # Static build of the Flask scrollytelling app.
      #
      # We render src/app.py once via Flask's test client – the route
      # handler does all data prep server-side, the resulting HTML page
      # is 100 % client-side (Plotly.js + embedded JSON). The captured
      # HTML lands at docs/build/app/index.html and rides along with the
      # Quarto Pages artefact uploaded below. Final URL:
      #   https://<user>.github.io/<repo>/app/
      # See deployment/DEPLOYMENT.md for details.
      # -----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: deployment/requirements-build.txt

      - name: Install build deps for static app
        run: pip install -r deployment/requirements-build.txt

      - name: Build static Flask app → docs/build/app/
        run: python deployment/build_static.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
